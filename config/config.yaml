# config/config.yaml
api_football:
  base_url: "https://v3.football.api-sports.io"

odds_api:
  base_url: "https://api.the-odds-api.com/v4"

competition:
  world_cup_league_id: 1

data:
  season_years_back: 5
  rolling_windows: [3, 5, 10]
  save_raw_dir: "data/raw"
  save_processed_dir: "data/processed"
  save_models_dir: "models"

model:
  test_size: 0.2
  random_state: 42
  n_estimators_rf: 200
  max_depth_rf: 10
  n_estimators_xgb: 300
  max_depth_xgb: 6
  learning_rate_xgb: 0.05
  n_estimators_lgbm: 300
  learning_rate_lgbm: 0.05
  calibration_cv: 5
