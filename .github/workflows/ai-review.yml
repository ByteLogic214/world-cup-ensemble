name: Gemini Global Repository Audit & Top Leagues Adaptation

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  global_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-generativeai

      - name: Run Global Gemini Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
          import os
          import google.generativeai as genai

          # Configurar la API de Gemini
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          
          # Archivos clave a escanear del repositorio
          files_to_scan = [
              "src/features.py",
              "src/model.py",
              "src/api_clients.py",
              "app.py",
              "requirements.txt"
          ]
          
          repo_context = ""
          for file_path in files_to_scan:
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      repo_context += f"\n\n=== ARCHIVO: {file_path} ===\n"
                      repo_context += f.read()
              else:
                  repo_context += f"\n\n=== ARCHIVO: {file_path} ===\n(No encontrado en el repositorio)\n"

          # System Prompt robusto enfocado en la transición a Ligas Top de Fútbol
          prompt = f"""
          Actúa como un Director de Ciencia de Datos y MLOps especializado en Analítica de Fútbol Avanzada (Smart Betting & Performance Tracking para ligas europeas: Premier League, LaLiga, Serie A, Bundesliga, Ligue 1).
          
          He cargado el código completo de mi repositorio que inicialmente fue diseñado para un Mundial (un torneo corto de un mes). Necesito que analices TODO el ecosistema de archivos adjunto abajo para encontrar errores críticos, cuellos de botella de rendimiento y me indiques exactamente qué modificar línea por línea para adaptarlo de forma masiva a todas las Ligas Top de 38 jornadas.
          
          Analiza y provee refactorizaciones específicas para:
          1. ERRORES DE LOGÍSTICA DE DATOS (src/api_clients.py): Encuentra fallas en el consumo de API-Football o The Odds API. Al escanear ligas top, el volumen de partidos se multiplica por 50. ¿Maneja paginación, control de cuotas y almacenamiento eficiente en caché local ('data/raw/')?
          
          2. INGENIERÍA DE VARIABLES RECURRENTES (src/features.py): ¿Cómo cambiamos el código para calcular ventanas móviles de rendimiento (Rolling Windows de 3, 5 y 10 partidos)? Evalúa si el código considera el factor localía extendido, días de descanso acumulados por competiciones UEFA (Champions/Europa League) y rachas de goles.
          
          3. VALIDACIÓN Y CALIBRACIÓN DEL ENSEMBLE (src/model.py): El Mundial usa una fase de grupos corta, pero las ligas tienen 38 jornadas donde el 'Empate' y las sorpresas de fin de temporada (equipos que pelean descenso vs campeones matemáticos) varían. Audita si calcula LogLoss y Brier Score. Corrige el Soft Voting para usar calibración probabilística (CalibratedClassifierCV).
          
          4. DEPENDENCIAS (requirements.txt): Asegura que XGBoost y LightGBM estén optimizados.
          
          A continuación tienes el código fuente de mi repositorio:
          {repo_context}
          
          Devuelve tu reporte detallado completamente en español. Si encuentras un archivo con errores severos o código faltante, escribe el bloque de código corregido que debería reemplazarlo.
          """

          # Llamar al modelo de última generación
          model = genai.GenerativeModel("gemini-2.5-pro")
          response = model.generate_content(prompt)
          
          # Imprimir el resultado directamente en la consola de GitHub Actions
          print("\n=======================================================")
          print("      REPORTE DE AUDITORÍA GLOBAL DE GEMINI AI         ")
          print("=======================================================")
          print(response.text)
