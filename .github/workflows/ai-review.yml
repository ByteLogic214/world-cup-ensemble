name: Gemini Global Repository Audit & Top Leagues Adaptation

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite que lo actives manualmente cuando quieras desde la pestaña Actions

jobs:
  global_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Official Modern SDK
        run: |
          pip install google-genai

      - name: Run Global Gemini Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
          import os
          from google import genai

          # 1. Recopilar de forma masiva los archivos clave del repositorio
          files_to_scan = [
              "src/features.py",
              "src/model.py",
              "src/api_clients.py",
              "app.py",
              "requirements.txt"
          ]
          
          repo_context = ""
          for file_path in files_to_scan:
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      repo_context += f"\n\n=== ARCHIVO: {file_path} ===\n"
                      repo_context += f.read()
              else:
                  repo_context += f"\n\n=== ARCHIVO: {file_path} ===\n(Archivo no encontrado en el repositorio actual)\n"

          # 2. Inicializar cliente con el nuevo SDK de Google
          # Detecta automáticamente de manera segura la variable de entorno GEMINI_API_KEY
          client = genai.Client()

          # 3. Diseñar el Prompt Técnico adaptado a Ligas Top de Fútbol
          prompt = f"""
          Actúa como un Director de Ciencia de Datos y MLOps experto en Analítica de Fútbol Avanzada (Modelos de apuestas 1X2 y rendimiento deportivo en Premier League, LaLiga, Serie A, Bundesliga).
          
          He cargado el código completo de mi repositorio que inicialmente fue diseñado para un Mundial (un torneo corto de un mes). Necesito que analices TODO el ecosistema de archivos adjunto abajo para encontrar errores críticos, cuellos de botella de rendimiento y me indiques exactamente qué modificar línea por línea para adaptarlo de forma masiva a todas las Ligas Top de 38 jornadas.
          
          Genera un reporte detallado y refactorizaciones de código específicas en español para:
          1. LOGÍSTICA DE DATOS (src/api_clients.py): El volumen de partidos de ligas regulares se multiplica exponencialmente. Corrige el código para usar paginación, control estricto de cuotas en API-Football / The Odds API y almacenamiento eficiente local en 'data/raw/'.
          
          2. INGENIERÍA DE VARIABLES (src/features.py): Explica y diseña cómo cambiar el código para calcular ventanas móviles de rendimiento (Rolling Windows de 3, 5 y 10 partidos), factor localía regular de la temporada actual y fatiga de plantilla por competiciones de copa intersemanales.
          
          3. CALIBRACIÓN Y MÉTRICAS (src/model.py): Las ligas largas tienen dinámicas estables de empates y sorpresas de fin de temporada. Audita si calcula LogLoss y Brier Score. Corrige el Soft Voting del Ensemble para usar CalibratedClassifierCV.
          
          4. DEPENDENCIAS (requirements.txt): Asegura versiones óptimas y estables de XGBoost, LightGBM y scikit-learn.
          
          A continuación tienes el código fuente de mi repositorio:
          {repo_context}
          """

          # 4. Llamada oficial a la Interactions API con Gemini
          try:
              interaction = client.interactions.create(
                  model="gemini-3.5-flash",
                  input=prompt
              )
              
              print("\n=======================================================")
              print("      REPORTE DE AUDITORÍA GLOBAL DE GEMINI AI         ")
              print("=======================================================")
              print(interaction.output_text)
              
          except Exception as e:
              print(f"Error al invocar la API de Gemini: {str(e)}")
              exit(1)
